name: Collect Binance OI

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: binance-oi-hourly
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run collector tests
        run: python -m unittest discover -s tests -v

      - name: Collect complete 10/10 snapshot
        run: python collect_oi.py --output data/binance_v1_forward_oi.csv --base-url https://fapi1.binance.com

      - name: Commit new snapshot
        shell: bash
        run: |
          git add data/binance_v1_forward_oi.csv
          if git diff --cached --quiet; then
            echo "No new hourly snapshot to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: collect Binance OI $(date -u +'%Y-%m-%dT%H:00Z')"
          git pull --rebase origin "$GITHUB_REF_NAME"
          git push origin "HEAD:$GITHUB_REF_NAME"
